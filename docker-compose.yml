services:
  db:
    image: postgres:16-alpine
    container_name: carpinteria-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carpinteria}
      POSTGRES_USER: ${POSTGRES_USER:-carpinteria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carpinteria}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carpinteria} -d ${POSTGRES_DB:-carpinteria}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: carpinteria-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://carpinteria:carpinteria@db:5432/carpinteria?schema=public}
      JWT_SECRET: ${JWT_SECRET:-cambiar-este-secreto-en-produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "4000:4000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: carpinteria-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
